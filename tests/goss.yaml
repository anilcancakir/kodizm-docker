# ---------------------------------------------------------------------------
# Service validation — requires real entrypoint (run via dgoss)
# ---------------------------------------------------------------------------

# Services are running
process:
  postgres:
    running: true
  redis-server:
    running: true

# Ports are open
port:
  tcp:5432:
    listening: true
  tcp:6379:
    listening: true

# Service connectivity
command:
  pg_isready:
    exec: "pg_isready -h localhost -p 5432"
    exit-status: 0
  redis_ping:
    exec: "redis-cli ping"
    exit-status: 0
    stdout: ["PONG"]
  pgvector_extension:
    exec: "psql -U agent -d agent -c \"CREATE EXTENSION IF NOT EXISTS vector;\""
    exit-status: 0
  gosu_agent:
    exec: "gosu agent whoami"
    exit-status: 0
    stdout: ["agent"]
  agent_user_exists:
    exec: "id agent"
    exit-status: 0
    stdout: ["uid=1001"]

# Agent user configuration
user:
  agent:
    exists: true
    uid: 1001
    shell: /bin/bash
    home: /home/agent

# Critical files
file:
  /opt/kodizm/entrypoint.sh:
    exists: true
    mode: "0755"
  /opt/kodizm/setup.sh:
    exists: true
    mode: "0755"
  /workspace:
    exists: true
    filetype: directory
    owner: agent
