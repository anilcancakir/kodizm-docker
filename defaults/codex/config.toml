# Codex CLI default config seeded by kodizm-ai-docker.
#
# The ContainerMcpInjector overlays the live Kodizm MCP endpoint + bearer
# at first boot via `~/.codex/config.toml` writes; this file is the
# baseline so codex starts in a known-good state when the named volume
# is freshly mounted.

[mcp_servers.kodizm]
url = "https://kodizm.local/mcp/__SESSION__"
authorization = "Bearer __KODIZM_MCP_TOKEN__"
