name: Build and Push Docker Image

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/anilcancakir/kodizm-docker:latest
            ghcr.io/anilcancakir/kodizm-docker:sha-${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/anilcancakir/kodizm-docker:buildcache
          cache-to: type=registry,ref=ghcr.io/anilcancakir/kodizm-docker:buildcache,mode=max
