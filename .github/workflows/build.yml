name: Build and Push Docker Image

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

# Coalesce in-flight runs on rapid consecutive pushes to main so the
# 21-minute build queue never piles up. The latest commit cancels any
# older run on the same branch; the scheduled weekly run gets its own
# group key so a Monday cron does not cancel a Friday push and vice
# versa.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/anilcancakir/kodizm-ai-docker:latest
            ghcr.io/anilcancakir/kodizm-ai-docker:sha-${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/anilcancakir/kodizm-ai-docker:buildcache
          cache-to: type=registry,ref=ghcr.io/anilcancakir/kodizm-ai-docker:buildcache,mode=max
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}

      - name: Trigger deploy webhook
        if: success()
        run: |
          curl -sf -X POST "${{ secrets.DOCKER_DEPLOY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.DOCKER_DEPLOY_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"image_tag": "sha-${{ github.sha }}", "git_sha": "${{ github.sha }}"}'
